<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div id="container">
        <h1>Tic Tac Toe</h1>
        <div id="cellContainer">
            <div data-value="0" class="cells"></div>
            <div data-value="1" class="cells"></div>
            <div data-value="2" class="cells"></div>
            <div data-value="3" class="cells"></div>
            <div data-value="4" class="cells"></div>
            <div data-value="5" class="cells"></div>
            <div data-value="6" class="cells"></div>
            <div data-value="7" class="cells"></div>
            <div data-value="8" class="cells"></div>
        </div>
        <h2 id="state">win</h2>
        <button id="newGame">New game</button>
    </div>
</body>
</html>
